<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Lessons — The Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/archive.css">
  <style>
    :root {
      --bg: #080706;
      --bg-2: #0F0D0B;
      --bg-card: #161412;
      --bg-elevated: #1E1B17;
      --gold: #C8A84B;
      --gold-bright: #E8C96E;
      --gold-dim: #7A6530;
      --text: #F0E6D3;
      --text-2: #B8A898;
      --text-3: #6B5E50;
      --serif: 'Cormorant Garamond', serif;
      --sans: 'DM Sans', sans-serif;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--sans); }

    .card {
      background: var(--bg-card);
      border: 1px solid rgba(200,168,75,0.1);
      transition: border-color 0.2s;
    }
    .card:hover { border-color: rgba(200,168,75,0.3); }

    /* Lesson rows inside accordions */
    .lesson-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      border-top: 1px solid rgba(200,168,75,0.06);
      transition: background 0.15s;
    }
    .lesson-row:hover { background: var(--bg-elevated); }

    .lesson-check {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(200,168,75,0.3);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .lesson-check.done {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg);
    }
    .lesson-check:not(.done):hover {
      border-color: var(--gold);
    }

    .lesson-type-icon {
      width: 24px; height: 24px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }
    .type-video { background: rgba(200,168,75,0.12); }
    .type-reading { background: rgba(200,168,75,0.08); }
    .type-exercise { background: rgba(232,201,110,0.1); }

    /* Chapter header row */
    .chapter-header {
      padding: 10px 20px;
      background: var(--bg-elevated);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      border-top: 1px solid rgba(200,168,75,0.1);
    }

    /* Badge overrides */
    .badge-crimson { background: rgba(200,168,75,0.15); color: var(--gold); border: 1px solid rgba(200,168,75,0.2); }
    .badge-green { background: rgba(200,168,75,0.08); color: var(--gold-dim); border: 1px solid rgba(200,168,75,0.12); }
    .badge-gold { background: rgba(232,201,110,0.12); color: var(--gold-bright); border: 1px solid rgba(232,201,110,0.2); }
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-title">The Archive</div>
      <div class="brand-sub">Music School</div>
    </div>
    <nav class="sidebar-nav">
      <a href="/student-dashboard.html" class="nav-item" id="nav-dash">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Dashboard
      </a>
      <a href="/course-catalog.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Library
      </a>
      <a href="/my-lessons.html" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        My Lessons
      </a>
      <a href="/sheet-music.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Sheet Music
      </a>
      <a href="/studio.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        Studio
      </a>
      <a href="/archive-browse.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
        Archive
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="handleLogout()">
        <div class="sidebar-avatar" id="sb-avatar">?</div>
        <div class="sidebar-user-info">
          <div class="user-name" id="sb-name">Loading…</div>
          <div class="user-role">Student</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <div class="topbar-title">My Lessons</div>
      <div class="topbar-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search lessons…">
      </div>
      <div class="topbar-actions">
        <button class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="badge-dot"></span></button>
        <div class="topbar-avatar" id="topbar-avatar">?</div>
      </div>
    </header>

    <main class="main-content">
      <div class="page-header">
        <div class="page-title">My Lessons</div>
        <p class="page-subtitle">Your enrolled courses and lesson progress.</p>
      </div>
      <div id="lessons-container">
        <div class="card skeleton" style="height:120px; margin-bottom:12px;"></div>
        <div class="card skeleton" style="height:120px; margin-bottom:12px;"></div>
      </div>
    </main>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth-guard.js"></script>
<script>requireRole(['student']);</script>
<script>
  function toast(msg, type = 'success') {
    const tc = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type === 'error' ? 'error' : ''}`;
    t.textContent = msg;
    tc.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  function handleLogout() {
    localStorage.removeItem('archive_token');
    localStorage.removeItem('archive_user');
    window.location.href = '/index.html';
  }

  document.addEventListener('userLoaded', (e) => {
    const user = e.detail;
    document.getElementById('sb-avatar').textContent = user.avatar_initials || '?';
    document.getElementById('sb-name').textContent = user.first_name + ' ' + user.last_name;
    document.getElementById('topbar-avatar').textContent = user.avatar_initials || '?';
    document.getElementById('nav-dash').href = user.role === 'instructor' ? '/instructor-dashboard.html' : '/student-dashboard.html';
    loadLessons();
  });

  async function loadLessons() {
    const container = document.getElementById('lessons-container');
    try {
      const data = await api.get('/api/enrollments/me');
      const enrollments = data.enrollments || [];
      if (!enrollments.length) {
        container.innerHTML = `<div class="card"><div class="empty-state"><div class="empty-icon">📖</div><h3>No courses yet</h3><p>Enroll in a course from the Library to see your lessons here.</p><a href="/course-catalog.html" class="btn btn-primary" style="display:inline-flex; margin-top:14px;">Browse Library</a></div></div>`;
        return;
      }
      const html = enrollments.map((e, idx) => `
        <div class="card content-card" style="padding:0; margin-bottom:14px; overflow:hidden;">
          <div style="background:${e.cover_color || 'rgba(200,168,75,0.15)'}; padding:16px 20px; display:flex; align-items:center; gap:14px; cursor:pointer; border-bottom:1px solid rgba(200,168,75,0.1);" onclick="toggleCourse(${e.course_id}, this)">
            <div style="flex:1;">
              <div style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:16px; font-weight:600; color:#fff;">${e.course_title}</div>
              <div style="font-size:11px; color:rgba(255,255,255,0.65); margin-top:2px;">${e.instructor_name || ''} · ${e.level || ''}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:20px; font-weight:700; color:var(--gold-bright);">${e.progress_pct || 0}%</div>
              <div class="progress-bar" style="width:80px; background:rgba(255,255,255,0.15); margin-top:4px;">
                <div class="progress-fill" style="background:var(--gold); width:${e.progress_pct || 0}%;"></div>
              </div>
            </div>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" class="accordion-chevron"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div id="course-chapters-${e.course_id}" style="display:none;">
            <div id="chapters-loading-${e.course_id}" style="padding:20px; text-align:center;"><div class="spinner" style="margin:auto;"></div></div>
          </div>
        </div>
      `).join('');
      container.innerHTML = html;
    } catch (err) {
      container.innerHTML = `<div class="card"><p style="padding:20px; font-size:13px; color:var(--text-3);">${err.message}</p></div>`;
    }
  }

  const loadedCourses = new Set();

  async function toggleCourse(courseId, header) {
    const body = document.getElementById(`course-chapters-${courseId}`);
    const chevron = header.querySelector('.accordion-chevron');
    if (body.style.display === 'block') {
      body.style.display = 'none';
      chevron.style.transform = '';
      return;
    }
    body.style.display = 'block';
    chevron.style.transform = 'rotate(180deg)';

    if (loadedCourses.has(courseId)) return;
    loadedCourses.add(courseId);

    try {
      const data = await api.get(`/api/courses/${courseId}/chapters`);
      const chapters = data.chapters || [];
      document.getElementById(`chapters-loading-${courseId}`).remove();
      if (!chapters.length) {
        body.innerHTML = '<div style="padding:16px 20px; font-size:13px; color:var(--text-3);">No lessons available yet.</div>';
        return;
      }
      body.innerHTML = chapters.map(ch => `
        <div>
          <div class="chapter-header">
            ${ch.order_index}. ${ch.title}
          </div>
          ${(ch.lessons || []).map(l => `
            <div class="lesson-row section-block">
              <div class="lesson-check ${l.completed ? 'done' : ''}" id="check-${l.id}" onclick="toggleLesson(${l.id}, ${courseId}, this)">
                ${l.completed ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
              </div>
              <div class="lesson-type-icon type-${l.type}">
                ${l.type === 'video' ? '▶' : l.type === 'reading' ? '📄' : l.type === 'exercise' ? '🎵' : '❓'}
              </div>
              <div style="flex:1; min-width:0;">
                <div style="font-size:13px; font-weight:${l.completed ? '400' : '600'}; color:${l.completed ? 'var(--text-3)' : 'var(--text)'}; ${l.completed ? 'text-decoration:line-through;' : ''}">${l.title}</div>
                <div style="font-size:11px; color:var(--text-3); margin-top:1px;">${l.duration_minutes ? l.duration_minutes + ' min' : ''}</div>
              </div>
              <span class="badge ${l.type === 'video' ? 'badge-crimson' : l.type === 'reading' ? 'badge-green' : 'badge-gold'}" style="font-size:11px;">${l.type}</span>
            </div>
          `).join('')}
        </div>
      `).join('');
    } catch (err) {
      document.getElementById(`chapters-loading-${courseId}`).innerHTML = `<p style="font-size:13px; color:var(--gold); padding:16px 20px;">${err.message}</p>`;
    }
  }

  async function toggleLesson(lessonId, courseId, el) {
    if (el.classList.contains('done')) return;
    try {
      const data = await api.post(`/api/lessons/${lessonId}/complete`, {});
      el.classList.add('done');
      el.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';
      const lessonRow = el.closest('.lesson-row');
      if (lessonRow) {
        const titleEl = lessonRow.querySelector('div[style*="font-weight"]');
        if (titleEl) {
          titleEl.style.textDecoration = 'line-through';
          titleEl.style.color = 'var(--text-3)';
          titleEl.style.fontWeight = '400';
        }
      }
      toast(`Lesson marked complete! Progress: ${data.progress_pct || 0}%`);
      loadedCourses.delete(courseId);
    } catch (err) {
      toast(err.message, 'error');
    }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script>
  gsap.registerPlugin(ScrollTrigger);
  gsap.from('.page-header, .stat-card, .content-card', {
    y: 24, opacity: 0, duration: 0.65, stagger: 0.07, ease: 'power3.out', delay: 0.1
  });
  gsap.utils.toArray('.section-block, .card-row, tr').forEach(el => {
    gsap.from(el, { scrollTrigger: { trigger: el, start: 'top 88%' },
      y: 16, opacity: 0, duration: 0.5, ease: 'power2.out' });
  });
</script>
</body>
</html>
